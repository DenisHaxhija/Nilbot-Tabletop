<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Campaigns · NilBot Tabletop</title>
		<style>
			@font-face {
				font-family: 'Cinzel';
				font-weight: 600;
				src: url('fonts/cinzel-latin-600-normal.woff2') format('woff2');
			}
			@font-face {
				font-family: 'Cinzel';
				font-weight: 700;
				src: url('fonts/cinzel-latin-700-normal.woff2') format('woff2');
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #0d1126;
				color: #d8dae0;
				font-family: Georgia, 'Times New Roman', serif;
				user-select: none;
			}
			.screen {
				position: fixed;
				inset: 0;
			}
			.backdrop {
				position: absolute;
				inset: 0;
				background:
					linear-gradient(180deg, rgba(10, 12, 24, 0.72) 0%, rgba(12, 14, 26, 0.55) 40%, rgba(8, 9, 18, 0.72) 100%),
					url('assets/title-bg.jpg') center 35% / cover no-repeat;
			}
			.vignette {
				position: absolute;
				inset: 0;
				background: radial-gradient(ellipse 85% 80% at 50% 45%, transparent 60%, rgba(6, 6, 16, 0.5) 100%);
				pointer-events: none;
			}
			main {
				position: relative;
				height: 100%;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 4rem 2rem 2rem;
				box-sizing: border-box;
				gap: 2rem;
			}
			h1 {
				margin: 0;
				font-family: 'Cinzel', Georgia, serif;
				font-weight: 700;
				font-size: clamp(1.8rem, 5vw, 2.6rem);
				letter-spacing: 0.3em;
				text-indent: 0.3em;
				color: #e6d9b8;
				text-shadow: 0 0 24px rgba(230, 217, 184, 0.22);
			}
			.sub {
				margin: 0.3rem 0 0;
				color: #8a8f9c;
				font-style: italic;
				font-size: 0.9rem;
				text-align: center;
			}
			.slots {
				width: min(560px, 92vw);
				display: grid;
				gap: 0.7rem;
				overflow-y: auto;
				padding: 0.2rem;
				flex: 1;
			}
			.slot {
				position: relative;
				display: flex;
				align-items: center;
				gap: 1rem;
				background: rgba(20, 22, 28, 0.75);
				border: 1px solid #2c2618;
				border-left: 3px solid #6b5a34;
				border-radius: 10px;
				padding: 1rem 1.2rem;
				cursor: pointer;
				transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease;
			}
			.slot:hover {
				border-color: #b8925c;
				background: rgba(28, 30, 38, 0.85);
				transform: translateX(3px);
			}
			.slot .name {
				font-family: 'Cinzel', Georgia, serif;
				font-weight: 600;
				font-size: 1.05rem;
				letter-spacing: 0.06em;
				color: #d9ceb2;
			}
			.slot .meta {
				margin-left: auto;
				color: #6a6f7c;
				font-size: 0.78rem;
				font-style: italic;
				text-align: right;
			}
			.slot .rm {
				background: transparent;
				border: none;
				color: #565b66;
				font-size: 0.95rem;
				cursor: pointer;
				padding: 0.2rem 0.3rem;
				opacity: 0;
				transition: opacity 0.15s ease, color 0.15s ease;
			}
			.slot:hover .rm {
				opacity: 1;
			}
			.slot .rm:hover {
				color: #d99a8f;
			}
			.slot.waking {
				pointer-events: none;
				opacity: 0.6;
			}
			.empty {
				color: #6a6f7c;
				font-style: italic;
				text-align: center;
				padding: 2.5rem 1rem;
				border: 1px dashed #2c2618;
				border-radius: 10px;
			}
			.create {
				width: min(560px, 92vw);
				display: flex;
				gap: 0.6rem;
			}
			.create input {
				flex: 1;
				background: rgba(20, 22, 28, 0.85);
				border: 1px solid #2c2618;
				border-radius: 8px;
				color: #d8dae0;
				font: inherit;
				font-size: 0.95rem;
				padding: 0.65rem 0.9rem;
				outline: none;
			}
			.create input:focus {
				border-color: #b8925c;
			}
			.create button {
				background: rgba(107, 90, 52, 0.35);
				border: 1px solid #6b5a34;
				border-radius: 8px;
				color: #e6d9b8;
				font: 600 0.9rem Georgia, serif;
				letter-spacing: 0.1em;
				padding: 0.65rem 1.3rem;
				cursor: pointer;
				transition: background 0.2s ease, border-color 0.2s ease;
			}
			.create button:hover {
				background: rgba(107, 90, 52, 0.55);
				border-color: #b8925c;
			}
			.err {
				color: #d99a8f;
				font-size: 0.85rem;
				min-height: 1.2em;
				margin: 0;
			}
			.back {
				position: absolute;
				top: 1.2rem;
				left: 1.4rem;
				color: #8a8f9c;
				text-decoration: none;
				font-size: 0.85rem;
				letter-spacing: 0.1em;
			}
			.back:hover {
				color: #e6d9b8;
			}
		</style>
	</head>
	<body>
		<div class="screen">
			<div class="backdrop"></div>
			<div class="vignette"></div>
			<main>
				<a class="back" href="title.html">← title</a>
				<header style="text-align:center">
					<h1>CAMPAIGNS</h1>
					<p class="sub">each campaign is its own world — bestiary, maps, sessions, everything</p>
				</header>
				<div class="slots" id="slots"></div>
				<p class="err" id="err"></p>
				<form class="create" id="create">
					<input id="name" placeholder="Name a new campaign — e.g. Echoes of Severance" maxlength="60" />
					<button type="submit">＋ Create</button>
				</form>
			</main>
		</div>
		<script>
			const slots = document.getElementById('slots');
			const err = document.getElementById('err');

			function fmt(iso) {
				return iso ? new Date(iso).toLocaleDateString() : null;
			}

			async function refresh() {
				const list = await window.tabletop.listCampaigns();
				slots.innerHTML = '';
				if (!list.length) {
					const d = document.createElement('div');
					d.className = 'empty';
					d.textContent = 'No campaigns yet — name your first world below.';
					slots.appendChild(d);
					return;
				}
				for (const c of list) {
					const s = document.createElement('div');
					s.className = 'slot';
					const played = fmt(c.lastPlayed);
					s.innerHTML =
						'<span class="name"></span><span class="meta">' +
						(played ? 'last played ' + played : 'never played') +
						'<br>created ' +
						fmt(c.created) +
						'</span><button class="rm" title="Remove from list (files kept)">✕</button>';
					s.querySelector('.name').textContent = c.name;
					s.addEventListener('click', async (e) => {
						if (e.target.closest('.rm')) return;
						err.textContent = '';
						s.classList.add('waking');
						s.querySelector('.meta').innerHTML = 'setting the table…';
						const res = await window.tabletop.openCampaign(c.id);
						if (res && res.error) {
							err.textContent = res.error;
							s.classList.remove('waking');
							refresh();
						}
					});
					s.querySelector('.rm').addEventListener('click', async () => {
						await window.tabletop.removeCampaign(c.id);
						refresh();
					});
					slots.appendChild(s);
				}
			}

			document.getElementById('create').addEventListener('submit', async (e) => {
				e.preventDefault();
				const input = document.getElementById('name');
				err.textContent = '';
				const res = await window.tabletop.createCampaign(input.value);
				if (res && res.error) {
					err.textContent = res.error;
					return;
				}
				input.value = '';
				await refresh();
				const opened = await window.tabletop.openCampaign(res.id);
				if (opened && opened.error) err.textContent = opened.error;
			});

			refresh();
		</script>
	</body>
</html>

<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Campaigns · NilBot Tabletop</title>
		<style>
			@font-face {
				font-family: 'VT323';
				src: url('fonts/vt323-latin-400-normal.woff2') format('woff2');
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #0b1026;
				user-select: none;
				cursor: default;
				font-family: 'VT323', monospace;
			}
			#pixel-bg {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				image-rendering: pixelated;
			}
			main {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 3.4rem 2rem 2rem;
				box-sizing: border-box;
				gap: 1.4rem;
			}
			.back {
				position: absolute;
				top: 1rem;
				left: 1.2rem;
				color: #8d90a8;
				text-decoration: none;
				font-size: 1.25rem;
				text-shadow: 2px 2px 0 #131022;
			}
			.back:hover {
				color: #ffe98a;
			}
			h1 {
				margin: 0;
				font-weight: 400;
				font-size: clamp(2.4rem, 6vw, 3.4rem);
				letter-spacing: 0.12em;
				text-indent: 0.12em;
				color: #ffd37a;
				text-shadow: 3px 3px 0 #221a30;
			}
			.sub {
				margin: -0.8rem 0 0;
				color: #9a9eb8;
				font-size: 1.05rem;
				text-align: center;
				text-shadow: 2px 2px 0 #131022;
			}
			/* RPG dialog panel: chunky double border, square corners */
			.panelbox {
				background: rgba(13, 16, 40, 0.92);
				border: 3px solid #8d93a0;
				box-shadow:
					0 0 0 3px #0b1026,
					inset 0 0 0 2px #0b1026;
				padding: 0.9rem;
				box-sizing: border-box;
			}
			.slots {
				width: min(560px, 92vw);
				display: grid;
				gap: 0.8rem;
				overflow-y: auto;
				flex: 1;
				padding: 0.3rem;
			}
			.slot {
				position: relative;
				display: flex;
				align-items: center;
				gap: 1rem;
				cursor: pointer;
			}
			.slot:hover {
				border-color: #ffe98a;
			}
			.slot .name {
				font-size: 1.55rem;
				color: #e8eaf4;
				text-shadow: 2px 2px 0 #131022;
				padding-left: 1.1rem;
				position: relative;
			}
			.slot:hover .name {
				color: #ffe98a;
			}
			.slot:hover .name::before {
				content: '▶';
				position: absolute;
				left: -0.2rem;
				top: 52%;
				transform: translateY(-50%);
				font-size: 1rem;
				color: #ffe98a;
			}
			.slot .meta {
				margin-left: auto;
				color: #8d90a8;
				font-size: 0.98rem;
				text-align: right;
				line-height: 1.25;
			}
			.slot .rm {
				background: transparent;
				border: none;
				color: #565b76;
				font-family: inherit;
				font-size: 1.1rem;
				cursor: pointer;
				padding: 0.1rem 0.2rem;
				opacity: 0;
			}
			.slot:hover .rm {
				opacity: 1;
			}
			.slot .rm:hover {
				color: #ff9a8a;
			}
			.slot.waking {
				pointer-events: none;
				opacity: 0.6;
			}
			.empty {
				color: #8d90a8;
				font-size: 1.2rem;
				text-align: center;
				padding: 2.2rem 1rem;
				text-shadow: 2px 2px 0 #131022;
			}
			.create {
				width: min(560px, 92vw);
				display: flex;
				gap: 0.8rem;
				box-sizing: border-box;
				padding: 0.3rem;
			}
			.create input {
				flex: 1;
				background: rgba(13, 16, 40, 0.92);
				border: 3px solid #8d93a0;
				box-shadow: 0 0 0 3px #0b1026;
				color: #e8eaf4;
				font-family: inherit;
				font-size: 1.25rem;
				padding: 0.45rem 0.8rem;
				outline: none;
			}
			.create input:focus {
				border-color: #ffe98a;
			}
			.create input::placeholder {
				color: #565b76;
			}
			.create button {
				background: #1c2b52;
				border: 3px solid #8d93a0;
				box-shadow: 0 0 0 3px #0b1026;
				color: #ffe98a;
				font-family: inherit;
				font-size: 1.2rem;
				letter-spacing: 0.06em;
				padding: 0.45rem 1.2rem;
				cursor: pointer;
			}
			.create button:hover {
				background: #24365e;
				border-color: #ffe98a;
			}
			.err {
				min-height: 1.3em;
				color: #ff9a8a;
				font-size: 1.05rem;
				margin: 0;
				text-shadow: 2px 2px 0 #131022;
			}
		</style>
	</head>
	<body>
		<canvas id="pixel-bg" aria-hidden="true"></canvas>
		<main>
			<a class="back" href="title.html">◀ TITLE</a>
			<header style="text-align:center">
				<h1>CAMPAIGNS</h1>
			</header>
			<p class="sub">each campaign is its own world — bestiary, maps, sessions, everything</p>
			<div class="slots" id="slots"></div>
			<p class="err" id="err"></p>
			<form class="create" id="create">
				<input id="name" placeholder="Name a new campaign..." maxlength="60" />
				<button type="submit">＋ CREATE</button>
			</form>
		</main>
		<script src="pixel-sky.js"></script>
		<script>
			const slots = document.getElementById('slots');
			const err = document.getElementById('err');

			function fmt(iso) {
				return iso ? new Date(iso).toLocaleDateString() : null;
			}

			async function refresh() {
				const list = await window.tabletop.listCampaigns();
				slots.innerHTML = '';
				if (!list.length) {
					const d = document.createElement('div');
					d.className = 'empty panelbox';
					d.textContent = 'No campaigns yet — name your first world below.';
					slots.appendChild(d);
					return;
				}
				for (const c of list) {
					const s = document.createElement('div');
					s.className = 'slot panelbox';
					const played = fmt(c.lastPlayed);
					s.innerHTML =
						'<span class="name"></span><span class="meta">' +
						(played ? 'last played ' + played : 'never played') +
						'<br>created ' +
						fmt(c.created) +
						'</span><button class="rm" title="Remove from list (files kept)">✕</button>';
					s.querySelector('.name').textContent = c.name;
					s.addEventListener('click', async (e) => {
						if (e.target.closest('.rm')) return;
						err.textContent = '';
						s.classList.add('waking');
						s.querySelector('.meta').innerHTML = 'setting the table...';
						const res = await window.tabletop.openCampaign(c.id);
						if (res && res.error) {
							err.textContent = res.error;
							s.classList.remove('waking');
							refresh();
						}
					});
					s.querySelector('.rm').addEventListener('click', async () => {
						await window.tabletop.removeCampaign(c.id);
						refresh();
					});
					slots.appendChild(s);
				}
			}

			document.getElementById('create').addEventListener('submit', async (e) => {
				e.preventDefault();
				const input = document.getElementById('name');
				err.textContent = '';
				const res = await window.tabletop.createCampaign(input.value);
				if (res && res.error) {
					err.textContent = res.error;
					return;
				}
				input.value = '';
				await refresh();
				const opened = await window.tabletop.openCampaign(res.id);
				if (opened && opened.error) err.textContent = opened.error;
			});

			refresh();
		</script>
	</body>
</html>

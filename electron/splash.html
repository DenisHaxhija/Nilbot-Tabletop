<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<style>
			:root {
				--accent: #7fbf7f;
				--muted: #8a8f9c;
			}
			html,
			body {
				margin: 0;
				height: 100%;
				background:
					radial-gradient(ellipse at 50% 120%, rgba(127, 191, 127, 0.09) 0%, transparent 55%),
					radial-gradient(ellipse at 50% -20%, #1b1e25 0%, #0e0f12 70%);
				color: #d8dae0;
				font-family: Georgia, 'Times New Roman', serif;
				overflow: hidden;
				user-select: none;
				display: flex;
				align-items: center;
				justify-content: center;
			}
			.stage {
				text-align: center;
			}
			/* Slow-turning rune ring around the die */
			.emblem {
				position: relative;
				width: 120px;
				height: 120px;
				margin: 0 auto 1.2rem;
			}
			.ring {
				position: absolute;
				inset: 0;
				border: 1px solid rgba(127, 191, 127, 0.35);
				border-radius: 50%;
				animation: spin 24s linear infinite;
			}
			.ring::before,
			.ring::after {
				content: '';
				position: absolute;
				width: 6px;
				height: 6px;
				border-radius: 50%;
				background: var(--accent);
				top: -3px;
				left: calc(50% - 3px);
				box-shadow: 0 0 10px rgba(127, 191, 127, 0.8);
			}
			.ring::after {
				top: auto;
				bottom: -3px;
			}
			.die {
				position: absolute;
				inset: 18px;
				animation: breathe 3.2s ease-in-out infinite;
			}
			.die svg {
				width: 100%;
				height: 100%;
				stroke: var(--accent);
				fill: none;
				stroke-width: 2.4;
				stroke-linejoin: round;
				filter: drop-shadow(0 0 12px rgba(127, 191, 127, 0.35));
			}
			@keyframes spin {
				to {
					transform: rotate(360deg);
				}
			}
			@keyframes breathe {
				0%,
				100% {
					transform: scale(1);
					opacity: 0.9;
				}
				50% {
					transform: scale(1.05);
					opacity: 1;
				}
			}
			h1 {
				margin: 0;
				font-size: 2.1rem;
				letter-spacing: 0.35em;
				text-indent: 0.35em;
				color: var(--accent);
				font-weight: 600;
			}
			.tag {
				margin: 0.35rem 0 1.6rem;
				color: var(--muted);
				font-style: italic;
				font-size: 0.92rem;
				letter-spacing: 0.08em;
			}
			.status {
				color: var(--muted);
				font-size: 0.8rem;
				letter-spacing: 0.12em;
				text-transform: uppercase;
			}
			.status::after {
				content: '';
				animation: dots 1.6s steps(4) infinite;
			}
			@keyframes dots {
				0% {
					content: '';
				}
				25% {
					content: '.';
				}
				50% {
					content: '..';
				}
				75% {
					content: '...';
				}
			}
		</style>
	</head>
	<body>
		<div class="stage">
			<div class="emblem">
				<div class="ring"></div>
				<div class="die">
					<svg viewBox="0 0 64 64" aria-hidden="true">
						<polygon points="32,4 56,17 56,47 32,60 8,47 8,17" />
						<polygon points="32,15 46,39 18,39" />
					</svg>
				</div>
			</div>
			<h1>NILBOT</h1>
			<p class="tag">the DM&rsquo;s workbench</p>
			<p class="status">Setting the table</p>
		</div>
	</body>
</html>

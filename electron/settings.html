<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>Settings · NilBot Tabletop</title>
		<style>
			@font-face {
				font-family: 'VT323';
				src: url('fonts/vt323-latin-400-normal.woff2') format('woff2');
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #0b1026;
				user-select: none;
				cursor: default;
				font-family: 'VT323', monospace;
			}
			#pixel-bg {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				image-rendering: pixelated;
			}
			main {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				padding: 3.4rem 2rem 2rem;
				box-sizing: border-box;
				gap: 1.8rem;
			}
			.back {
				position: absolute;
				top: 1rem;
				left: 1.2rem;
				color: #8d90a8;
				text-decoration: none;
				font-size: 1.25rem;
				text-shadow: 2px 2px 0 #131022;
			}
			.back:hover {
				color: #ffe98a;
			}
			h1 {
				margin: 0;
				font-weight: 400;
				font-size: clamp(2.4rem, 6vw, 3.4rem);
				letter-spacing: 0.12em;
				text-indent: 0.12em;
				color: #ffd37a;
				text-shadow: 3px 3px 0 #221a30;
			}
			.rows {
				width: min(520px, 92vw);
				display: grid;
				gap: 0.8rem;
				padding: 0.3rem;
			}
			.row {
				display: flex;
				align-items: center;
				gap: 1rem;
				background: rgba(13, 16, 40, 0.92);
				border: 3px solid #8d93a0;
				box-shadow:
					0 0 0 3px #0b1026,
					inset 0 0 0 2px #0b1026;
				padding: 0.8rem 1rem;
			}
			.row .what {
				font-size: 1.4rem;
				color: #e8eaf4;
				text-shadow: 2px 2px 0 #131022;
			}
			.row .detail {
				color: #8d90a8;
				font-size: 0.95rem;
				line-height: 1.2;
				word-break: break-all;
			}
			.row .act {
				margin-left: auto;
				flex-shrink: 0;
			}
			.row button {
				background: #1c2b52;
				border: 3px solid #8d93a0;
				box-shadow: 0 0 0 3px #0b1026;
				color: #ffe98a;
				font-family: inherit;
				font-size: 1.05rem;
				letter-spacing: 0.05em;
				padding: 0.35rem 0.9rem;
				cursor: pointer;
			}
			.row button:hover {
				background: #24365e;
				border-color: #ffe98a;
			}
			footer {
				position: absolute;
				bottom: 1rem;
				color: #7a7e98;
				font-size: 1rem;
				text-shadow: 1px 1px 0 #131022;
			}
		</style>
	</head>
	<body>
		<canvas id="pixel-bg" aria-hidden="true"></canvas>
		<main>
			<a class="back" href="title.html">◀ TITLE</a>
			<h1>SETTINGS</h1>
			<div class="rows">
				<div class="row">
					<div>
						<div class="what">Fullscreen</div>
						<div class="detail">the table deserves the whole screen</div>
					</div>
					<div class="act"><button id="fs">...</button></div>
				</div>
				<div class="row">
					<div>
						<div class="what">Campaign files</div>
						<div class="detail" id="data-path"></div>
					</div>
					<div class="act"><button id="open-data">OPEN FOLDER</button></div>
				</div>
			</div>
			<footer id="version"></footer>
		</main>
		<script src="pixel-sky.js"></script>
		<script>
			const fsBtn = document.getElementById('fs');
			function fsLabel(on) {
				fsBtn.textContent = on ? 'ON — TURN OFF' : 'OFF — TURN ON';
			}
			(async () => {
				const info = await window.tabletop.settingsInfo();
				fsLabel(info.fullscreen);
				document.getElementById('data-path').textContent = info.dataPath;
				document.getElementById('version').textContent = 'NilBot Tabletop · v' + info.version;
			})();
			fsBtn.addEventListener('click', async () => {
				fsLabel(await window.tabletop.toggleFullscreen());
			});
			document.getElementById('open-data').addEventListener('click', () => {
				window.tabletop.openDataFolder();
			});
		</script>
	</body>
</html>

<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>NilBot Tabletop</title>
		<style>
			@font-face {
				font-family: 'Jacquard 12';
				src: url('fonts/jacquard-12-latin-400-normal.woff2') format('woff2');
			}
			@font-face {
				font-family: 'VT323';
				src: url('fonts/vt323-latin-400-normal.woff2') format('woff2');
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #0b1026;
				user-select: none;
				cursor: default;
			}
			#pixel-bg {
				position: fixed;
				inset: 0;
				width: 100vw;
				height: 100vh;
				image-rendering: pixelated;
			}
			main {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 2.4rem;
			}
			header {
				text-align: center;
			}
			.goblin {
				width: 96px;
				height: 96px;
				image-rendering: pixelated;
				margin-bottom: 0.4rem;
			}
			h1 {
				margin: 0;
				font-family: 'VT323', monospace;
				font-weight: 400;
				font-size: clamp(4.2rem, 11vw, 6.5rem);
				line-height: 0.95;
				letter-spacing: 0.08em;
				text-indent: 0.08em;
				text-transform: uppercase;
				color: #ffd37a;
				text-shadow:
					4px 4px 0 #221a30;
			}
			.sub {
				margin: 0.5rem 0 0;
				font-family: 'VT323', monospace;
				font-size: clamp(1.1rem, 2.6vw, 1.5rem);
				letter-spacing: 0.55em;
				text-indent: 0.55em;
				color: #c8cbe0;
				text-shadow: 2px 2px 0 #131022;
			}
			nav {
				display: grid;
				gap: 0.15rem;
			}
			.item {
				position: relative;
				display: block;
				text-align: center;
				padding: 0.35rem 2.4rem;
				text-decoration: none;
				background: transparent;
				border: none;
				cursor: pointer;
			}
			.label {
				font-family: 'VT323', monospace;
				font-size: 1.9rem;
				color: #cfd2e8;
				text-shadow: 2px 2px 0 #131022;
			}
			.item::before {
				content: '▶';
				position: absolute;
				left: 0.6rem;
				top: 50%;
				transform: translateY(-54%);
				font-family: 'VT323', monospace;
				font-size: 1.3rem;
				color: #ffe98a;
				opacity: 0;
			}
			.item:hover .label,
			.item:focus-visible .label {
				color: #ffe98a;
			}
			.item:hover::before,
			.item:focus-visible::before {
				opacity: 1;
			}
			.quit .label {
				color: #8d90a8;
			}
			.quit:hover .label {
				color: #ff9a8a;
			}
			.whisper {
				min-height: 1.4em;
				margin: -1.6rem 0 0;
				text-align: center;
				font-family: 'VT323', monospace;
				font-size: 1.05rem;
				color: #9a9eb8;
				text-shadow: 2px 2px 0 #131022;
			}
			footer {
				position: absolute;
				bottom: 1rem;
				left: 0;
				right: 0;
				display: flex;
				justify-content: center;
				gap: 0.7rem;
				font-family: 'VT323', monospace;
				font-size: 0.95rem;
				color: #7a7e98;
				text-shadow: 1px 1px 0 #131022;
			}
		</style>
	</head>
	<body>
		<canvas id="pixel-bg" aria-hidden="true"></canvas>
		<main>
			<header>
				<img class="goblin" src="icon.png" alt="" />
				<h1>NilBot</h1>
				<p class="sub">TABLETOP</p>
			</header>
			<nav id="menu">
				<a class="item" href="campaigns.html"><span class="label">Campaigns</span></a>
				<button class="item" id="join"><span class="label">Join a Campaign</span></button>
				<a class="item" href="settings.html"><span class="label">Settings</span></a>
				<button class="item quit" id="quit"><span class="label">Quit</span></button>
			</nav>
			<p class="whisper" id="whisper"></p>
			<footer>
				<span>a workbench for dungeon masters</span><span>·</span><span>5e-compatible</span>
			</footer>
		</main>
		<script src="pixel-sky.js"></script>
		<script>
			document.getElementById('quit').addEventListener('click', () => window.close());
			document.getElementById('join').addEventListener('click', () => {
				document.getElementById('whisper').textContent =
					'the road to other tables is still being built...';
			});
		</script>
	</body>
</html>

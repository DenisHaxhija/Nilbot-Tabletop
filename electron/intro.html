<!doctype html>
<html>
	<head>
		<meta charset="utf-8" />
		<title>NilBot Tabletop</title>
		<style>
			@font-face {
				font-family: 'VT323';
				src: url('fonts/vt323-latin-400-normal.woff2') format('woff2');
			}
			html,
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				background: #050509;
				user-select: none;
				cursor: default;
				font-family: 'VT323', monospace;
			}
			main {
				position: fixed;
				inset: 0;
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1.6rem;
				animation: cardfade 0.5s ease-out both;
			}
			main.out {
				animation: cardout 0.45s ease both;
			}
			@keyframes cardfade {
				from {
					opacity: 0;
				}
				to {
					opacity: 1;
				}
			}
			@keyframes cardout {
				from {
					opacity: 1;
				}
				to {
					opacity: 0;
				}
			}
			#emblem {
				width: 102px;
				height: 102px;
				image-rendering: pixelated;
			}
			h1 {
				margin: 0;
				font-weight: 400;
				font-size: clamp(2.2rem, 6vw, 3.4rem);
				letter-spacing: 0.18em;
				text-indent: 0.18em;
				color: #ffd37a;
				text-shadow: 3px 3px 0 #221a30;
			}
			.presents {
				margin: -0.6rem 0 0;
				font-size: 1.25rem;
				letter-spacing: 0.5em;
				text-indent: 0.5em;
				color: #8d90a8;
				text-shadow: 2px 2px 0 #131022;
			}
			.skip {
				position: absolute;
				bottom: 1.1rem;
				right: 1.4rem;
				font-size: 0.95rem;
				color: #3f4258;
			}
		</style>
	</head>
	<body>
		<main>
			<canvas id="emblem" width="17" height="17" aria-hidden="true"></canvas>
			<div style="text-align:center">
				<h1>THE GIANT SLAYERS</h1>
				<p class="presents">PRESENT</p>
			</div>
		</main>
		<span class="skip">press any key</span>
		<script>
			// Crossed pixel greatswords — the Giant Slayers' mark. Blades run
			// three pixels thick: giant-slaying is heavy work.
			const MAP = [
				'.SS...........SS.',
				'.SSS.........SSS.',
				'..SSS.......SSS..',
				'...SSS.....SSS...',
				'....SSS...SSS....',
				'.....SSS.SSS.....',
				'......SSSSS......',
				'.......SSS.......',
				'......SSWSS......',
				'.....SSS.SSS.....',
				'....SSS...SSS....',
				'...SSS.....SSS...',
				'.ggggg.....ggggg.',
				'....hhh...hhh....',
				'...hhh.....hhh...',
				'..hhh.......hhh..',
				'.gg...........gg.'
			];
			const PAL = { S: '#d4dce8', W: '#ffffff', g: '#d8a548', h: '#4a3320' };
			const ctx = document.getElementById('emblem').getContext('2d');
			MAP.forEach((row, y) => {
				[...row].forEach((ch, x) => {
					if (PAL[ch]) {
						ctx.fillStyle = PAL[ch];
						ctx.fillRect(x, y, 1, 1);
					}
				});
			});

			// On to the title — after the card plays, or the moment you ask.
			// The card fades to black first; the title fades up from the same
			// black, so the handoff reads as one motion.
			let gone = false;
			function go() {
				if (gone) return;
				gone = true;
				document.querySelector('main').classList.add('out');
				setTimeout(() => location.replace('title.html'), 460);
			}
			setTimeout(go, 2800);
			addEventListener('keydown', go);
			addEventListener('mousedown', go);
		</script>
	</body>
</html>

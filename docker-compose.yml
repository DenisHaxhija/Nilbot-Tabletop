services:
  nilbot:
    build: .
    restart: unless-stopped
    ports:
      - '127.0.0.1:3000:3000'
    environment:
      - ORIGIN=${ORIGIN}
      - BODY_SIZE_LIMIT=104857600
      # User-file storage (src/lib/server/storage.ts). Defaults to local disk
      # under data/store; set STORAGE_BACKEND=s3 + the S3_* vars to use an
      # S3-compatible bucket (Hetzner Object Storage, R2, AWS).
      - STORAGE_BACKEND=${STORAGE_BACKEND:-local}
      - STORAGE_CAP_MB=${STORAGE_CAP_MB:-4096}
      - S3_ENDPOINT=${S3_ENDPOINT:-}
      - S3_REGION=${S3_REGION:-}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY:-}
      - S3_SECRET=${S3_SECRET:-}
      # Include the mounted Claude CLI on PATH for the LLM features.
      - PATH=/root/.local/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
    volumes:
      # All user data (SQLite DB, maps, tokens, portraits, music) lives outside
      # the container — rebuilds and upgrades never touch it.
      - ./data:/app/data
      # Claude CLI + subscription credentials from the host (Battle Extractor,
      # Sheet Builder). Never baked into the image.
      - /root/.local:/root/.local
      - /root/.claude:/root/.claude
      - /root/.claude.json:/root/.claude.json
